<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DOPPIO Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>

<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --verde: #4A5E4A;
            --terracota: #C4714F;
            --terracota-dark: #A85A3A;
            --bege: #F5F0E8;
            --bege-dark: #EDE6D6;
            --texto: #2C2416;
            --texto-suave: #8A7D6B;
            --branco: #FDFBF7;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bege);
            color: var(--texto);
            min-height: 100vh;
        }

        /* ===== LOGIN ===== */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-box {
            background: var(--branco);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(44,36,22,0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-logo {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--verde);
        }

        .login-subtitle {
            text-align: center;
            color: var(--texto-suave);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--texto);
        }

        .form-input {
            width: 100%;
            padding: 0.9rem;
            border: 1px solid var(--bege-dark);
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            background: var(--bege);
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--terracota);
            background: var(--branco);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--texto-suave);
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--terracota);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: var(--terracota-dark);
            transform: translateY(-2px);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #FEE2E2;
            color: #B91C1C;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        /* Validação do código (cadastro) */
        .code-status { font-size: 0.8rem; margin-top: -0.5rem; color: var(--texto-suave); }
        .code-status.ok { color: #0A8A3A; }
        .code-status.warn { color: #B91C1C; }


        /* ===== HUB (Cliente) ===== */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }
        @media (max-width: 900px) {
            .projects-grid { grid-template-columns: 1fr; }
        }

        .project-card {
            background: var(--branco);
            border: 1px solid rgba(44,36,22,0.10);
            border-radius: 14px;
            padding: 16px;
            transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
            display: flex;
            align-items: stretch;
            justify-content: space-between;
            gap: 12px;
            min-height: 92px;
        }
        .project-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(44,36,22,0.10);
            border-color: rgba(196,113,79,0.35);
        }
        .project-card.disabled:hover {
            transform: none;
            box-shadow: none;
            border-color: rgba(44,36,22,0.10);
        }

        .hub-left { display:flex; gap: 12px; align-items:flex-start; }
        .hub-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            background: var(--bege-dark);
            display:flex; align-items:center; justify-content:center;
            font-size: 22px;
            flex: 0 0 44px;
        }
        .hub-title { font-weight: 700; font-size: 1.0rem; }
        .hub-sub { color: var(--texto-suave); font-size: 0.9rem; margin-top: 4px; line-height: 1.25; }

        .hub-actions { display:flex; align-items:center; justify-content:flex-end; }
        .hub-open {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            background: var(--terracota);
            color: #fff;
            white-space: nowrap;
        }
        .hub-open:hover { background: var(--terracota-dark); }
        .hub-open[aria-disabled="true"] {
            background: rgba(0,0,0,0.06);
            color: rgba(44,36,22,0.45);
            pointer-events: none;
        }

        /* ===== PORTAL ===== */
        .portal-container {
            display: none;
            min-height: 100vh;
        }

        .portal-container.active {
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: var(--verde);
            display: flex;
            flex-direction: column;
            padding: 2rem 0;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
        }

        .sidebar-logo {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.25em;
            color: var(--bege);
            padding: 0 1.5rem 2rem;
            border-bottom: 1px solid rgba(245,240,232,0.1);
        }

        .sidebar-menu {
            flex: 1;
            padding: 2rem 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem 1.5rem;
            color: rgba(245,240,232,0.6);
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-item:hover {
            background: rgba(245,240,232,0.05);
            color: var(--bege);
        }

        .menu-item.active {
            background: rgba(245,240,232,0.08);
            color: var(--bege);
            border-left-color: var(--terracota);
        }

        .menu-label {
            font-size: 0.7rem;
            color: rgba(245,240,232,0.3);
            padding: 0.5rem 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .sidebar-user {
            padding: 1.5rem;
            border-top: 1px solid rgba(245,240,232,0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            color: var(--bege);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--terracota);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .user-name {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .user-role {
            font-size: 0.75rem;
            color: rgba(245,240,232,0.5);
        }

        .btn-logout {
            width: 100%;
            padding: 0.6rem;
            background: rgba(245,240,232,0.08);
            border: 1px solid rgba(245,240,232,0.15);
            border-radius: 6px;
            color: rgba(245,240,232,0.6);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(245,240,232,0.15);
            color: var(--bege);
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 260px;
            padding: 2.5rem;
            min-height: 100vh;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 500;
            color: var(--texto);
            margin-bottom: 0.25rem;
        }

        .page-subtitle {
            color: var(--texto-suave);
            font-size: 0.9rem;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* CARDS */
        .card {
            background: var(--branco);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 24px rgba(44,36,22,0.08);
            margin-bottom: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--branco);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(44,36,22,0.08);
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--texto-suave);
            margin-bottom: 0.75rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: var(--texto);
        }

        /* BOTÕES */
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--terracota);
            color: white;
        }

        .btn-primary:hover {
            background: var(--terracota-dark);
        }

        .btn-secondary {
            background: var(--bege-dark);
            color: var(--texto);
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--texto-suave);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--bege-dark);
            border-top-color: var(--terracota);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            background: var(--verde);
            color: white;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.error {
            background: #B91C1C;
        }



        /* GALERIA */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .gallery-item {
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            background: var(--bege-dark);
            position: relative;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0.75rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .gallery-item:hover .gallery-item-name {
            opacity: 1;
        }

        .gallery-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 2rem;
        }

        .gallery-modal.show {
            display: flex;
        }

        .gallery-modal-content {
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .gallery-modal img {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .gallery-modal-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            gap: 1rem;
        }

        .gallery-modal-name {
            font-size: 1rem;
            font-weight: 500;
        }

        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .gallery-nav:hover {
            background: rgba(255,255,255,0.25);
        }

        .gallery-nav-prev { left: 2rem; }
        .gallery-nav-next { right: 2rem; }
        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--branco);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* Forms inside modals (admin cadastro/config) */
        .modal-scroll {
            max-height: 85vh;
            overflow: auto;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem 1.25rem;
        }
        .form-grid .form-group { margin-bottom: 0; }
        .grid-span-2 { grid-column: 1 / -1; }

        /* Make admin modals wider for better legibility */
        #modalNovoCliente .modal,
        #modalConfigHub .modal {
            max-width: 920px;
        }


        .modal h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--texto);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-block {
            flex: 1;
        }
        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
            }
            .main-content {
                margin-left: 200px;
                padding: 1.5rem;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .form-grid { grid-template-columns: 1fr; }
            .grid-span-2 { grid-column: auto; }
        }


    /* GALLERY FULLSCREEN */
    #galleryModal .modal{
        max-width: 1100px;
        width: 95%;
        padding: 1rem;
    }
    #galleryModal #galleryImage{
        max-width: 100%;
        max-height: 78vh;
        width: auto;
        height: auto;
        object-fit: contain;
        display: block;
        margin: 0 auto;
    }

        /* Dados (modal) */
        .data-section { padding: 12px 12px 6px; border: 1px solid rgba(0,0,0,0.06); border-radius: 14px; background: rgba(255,255,255,0.85); margin-bottom: 12px; }
        .data-title { font-weight: 700; margin-bottom: 10px; color: var(--texto); }
        .data-grid { display: grid; gap: 10px; }
        .data-row { display: grid; grid-template-columns: 140px 1fr; gap: 14px; padding: 8px 0; border-top: 1px dashed rgba(0,0,0,0.08); }
        .data-row:first-child { border-top: none; padding-top: 0; }
        .data-k { color: var(--texto-suave); font-size: 0.9rem; }
        .data-v { color: var(--texto); font-weight: 600; }
        @media (max-width: 560px) {
          .data-row { grid-template-columns: 1fr; gap: 4px; }
          .data-v { font-weight: 600; }
        }


        /* Listas (Admin) mais leves */
        .files-list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
        .file-item { display:flex; align-items:center; justify-content:space-between; gap: 16px; padding: 14px 14px; border-radius: 14px;
                    border: 1px solid rgba(0,0,0,0.06); background: rgba(255,255,255,0.92); }
        .file-info { min-width: 220px; }
        .file-name { font-weight: 700; font-size: 1.02rem; line-height: 1.25; margin-bottom: 4px; }
        .file-meta { color: var(--texto-suave); font-size: 0.9rem; }
        .file-actions { display:flex; flex-wrap: wrap; gap: 10px; justify-content:flex-end; }
        @media (max-width: 720px) {
          .file-item { flex-direction: column; align-items: flex-start; }
          .file-actions { justify-content:flex-start; }
        }

</style>
<style>
/* Admin delete badge (does not change layout flow) */
.gallery-item{ position: relative; }
.gallery-delete-badge{
    position:absolute; top:8px; right:8px;
    background: rgba(0,0,0,0.55);
    color:#fff; border:0; border-radius:10px;
    padding:6px 8px; font-size:12px; cursor:pointer;
    display:none;
}
</style></head>
<body>
<!-- LOGIN -->
<div class="login-container" id="loginPage">
<div class="login-box">
<div class="login-logo">DOPPIO</div>
<div class="login-subtitle">Portal do Cliente</div>
<div class="error-message" id="loginError"></div>
<div class="form-group">
<label class="form-label">Email</label>
<input class="form-input" id="loginEmail" placeholder="seu@email.com" type="email"/>
</div>
<div class="form-group">
<label class="form-label">Senha</label>
<div class="password-wrapper">
<input class="form-input" id="loginPassword" placeholder="••••••••" style="padding-right: 3rem;" type="password"/>
<button class="password-toggle" onclick="togglePassword()" type="button">
<svg fill="none" height="20" id="eyeIcon" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" width="20">
<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
<circle cx="12" cy="12" r="3"></circle>
</svg>
</button>
</div>
</div>
<button class="btn-login" id="btnLogin" onclick="handleLogin()">Entrar</button>
</div>
</div>
<!-- PORTAL -->
<div class="portal-container" id="portalPage">
<aside class="sidebar">
<div class="sidebar-logo">DOPPIO</div>
<div class="sidebar-menu">
<div class="menu-item active" onclick="showSection('dashboard')">
<svg fill="none" height="18" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" width="18">
<rect height="7" width="7" x="3" y="3"></rect>
<rect height="7" width="7" x="14" y="3"></rect>
<rect height="7" width="7" x="3" y="14"></rect>
<rect height="7" width="7" x="14" y="14"></rect>
</svg>
                Dashboard
            </div>
<div class="menu-item" onclick="showSection('clientes')">
<svg fill="none" height="18" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" width="18">
<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
<circle cx="9" cy="7" r="4"></circle>
<path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
</svg>
                Cadastro
            </div>
<!-- MENU ADMIN -->

</div>
<div class="sidebar-user">
<div class="user-info">
<div class="user-avatar" id="userAvatar">?</div>
<div>
<div class="user-name" id="userName">Usuário</div>
<div class="user-role" id="userRole">Cliente</div>
</div>
</div>
<button class="btn-logout" onclick="handleLogout()">Sair</button>
</div>
</aside>
<main class="main-content">
<!-- DASHBOARD -->
<section class="section active" id="sectionDashboard">
<div class="page-header">
<h1 class="page-title" id="dashboardTitle">Dashboard</h1>
<p class="page-subtitle">Bem-vindo ao portal</p>
</div>
<div id="dashboardContent">
<div class="loading"><div class="spinner"></div></div>
</div>
</section>
<!-- CLIENTES -->
<section class="section" id="sectionClientes">
<div class="page-header">
<h1 class="page-title">Cadastro</h1>
<p class="page-subtitle">Cadastrar clientes e configurar links do Drive</p>
</div>
<div id="clientesContent">
<div class="loading"><div class="spinner"></div></div>
</div>
</section>
<!-- UPLOAD -->

</main>
</div>
<!-- MODAL GALERIA -->

<!-- MODAL NOVO CLIENTE -->

<div class="modal-overlay" id="modalNovoCliente">
<div class="modal modal-scroll">
<h2>Novo Acesso</h2>
<div class="form-grid">
<div class="form-group">
<label class="form-label">Código</label>
<input class="form-input" id="novoClienteCodigo" placeholder="Ex: 2026-014" type="text"/>
</div>
<div class="form-group">
<label class="form-label">Tipo de acesso</label>
<select class="form-input" id="novoTipo">
<option value="client" selected>Cliente</option>
<option value="supplier">Fornecedor</option>
</select>
</div>
<div class="form-group grid-span-2"><div id="codigoStatus" class="code-status"></div></div>
<div class="form-group">
<label class="form-label">Nome</label>
<input class="form-input" id="novoClienteCliente" placeholder="Ex: Silva" type="text"/>
</div>
<div class="form-group grid-span-2">
<label class="form-label">Projeto</label>
<input class="form-input" id="novoClienteProjeto" placeholder="Ex: Residência Alphaville" type="text"/>
</div>
<div class="form-group grid-span-2">
<label class="form-label">Endereço</label>
<input class="form-input" id="novoClienteEndereco" placeholder="(opcional)" type="text"/>
</div>
<div class="form-group" id="fgTelefone">
<label class="form-label">Telefone</label>
<input class="form-input" id="novoClienteTelefone" placeholder="(opcional)" type="text"/>

const SESSION_KEY = "doppio_portal_session_v1";

const el = (id) => document.getElementById(id);

function nowISO() { return new Date().toISOString(); }

function formatDateBR(isoDateOrISO) {
  if (!isoDateOrISO) return "";
  const d = isoDateOrISO.length === 10 ? new Date(isoDateOrISO + "T00:00:00") : new Date(isoDateOrISO);
  if (Number.isNaN(d.getTime())) return "";
  return new Intl.DateTimeFormat("pt-BR").format(d);
}

function uid() { return Math.random().toString(16).slice(2) + "-" + Date.now().toString(16); }

async function sha256(text) {
  try {
    if (globalThis.crypto && crypto.subtle && globalThis.isSecureContext) {
      const enc = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest("SHA-256", enc);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }
  } catch (e) {}
  return sha256_fallback(text);
}

function sha256_fallback(ascii) {
  function rightRotate(value, amount) { return (value>>>amount) | (value<<(32-amount)); }
  var mathPow = Math.pow;
  var maxWord = mathPow(2, 32);
  var lengthProperty = 'length'
  var i, j;
  var result = '';
  var words = [];
  var asciiBitLength = ascii[lengthProperty]*8;
  var hash = sha256_fallback.h = sha256_fallback.h || [];
  var k = sha256_fallback.k = sha256_fallback.k || [];
  var primeCounter = k[lengthProperty];
  var isComposite = {};
  for (var candidate = 2; primeCounter < 64; candidate++) {
    if (!isComposite[candidate]) {
      for (i = 0; i < 313; i += candidate) { isComposite[i] = candidate; }
      hash[primeCounter] = (mathPow(candidate, .5)*maxWord)|0;
      k[primeCounter++] = (mathPow(candidate, 1/3)*maxWord)|0;
    }
  }
  ascii += '\x80';
  while (ascii[lengthProperty]%64 - 56) ascii += '\x00';
  for (i = 0; i < ascii[lengthProperty]; i++) {
    j = ascii.charCodeAt(i);
    words[i>>2] |= j << ((3 - i)%4)*8;
  }
  words[words[lengthProperty]] = ((asciiBitLength/maxWord)|0);
  words[words[lengthProperty]] = (asciiBitLength)
  for (j = 0; j < words[lengthProperty];) {
    var w = words.slice(j, j += 16);
    var oldHash = hash.slice(0);
    for (i = 0; i < 64; i++) {
      var w15 = w[i - 15], w2 = w[i - 2];
      var a = hash[0], e = hash[4];
      var temp1 = hash[7]
        + (rightRotate(e, 6) ^ rightRotate(e, 11) ^ rightRotate(e, 25))
        + ((e&hash[5])^((~e)&hash[6]))
        + k[i]
        + (w[i] = (i < 16) ? w[i] : (
            w[i - 16]
            + (rightRotate(w15, 7) ^ rightRotate(w15, 18) ^ (w15>>>3))
            + w[i - 7]
            + (rightRotate(w2, 17) ^ rightRotate(w2, 19) ^ (w2>>>10))
          )|0
        );
      var temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22))
        + ((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash = [(temp1 + temp2)|0].concat(hash);
      hash[4] = (hash[4] + temp1)|0;
      hash.pop();
    }
    for (i = 0; i < 8; i++) hash[i] = (hash[i] + oldHash[i])|0;
  }
  for (i = 0; i < 8; i++) {
    for (j = 3; j + 1; j--) {
      var b = (hash[i] >> (j*8)) & 255;
      result += ((b < 16) ? 0 : '') + b.toString(16);
    }
  }
  return result;
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { const st = JSON.parse(raw); if (!st.clients) st.clients = []; if (!st.suppliers) st.suppliers = []; return st; } catch(e) {}
  }
  const initial = { admin: DEFAULT_ADMIN, clients: [], suppliers: [] };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(initial));
  return initial;
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.error(e); showToast("Não foi possível salvar. As imagens podem estar muito pesadas."); throw e; }
}

function loadSession() {
  const raw = sessionStorage.getItem(SESSION_KEY);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch(e) { return null; }
}
function saveSession(session) { sessionStorage.setItem(SESSION_KEY, JSON.stringify(session)); }
function clearSession() { sessionStorage.removeItem(SESSION_KEY); }

function showToast(msg) {
  const t = el("toast");
  if (!t) { alert(msg); return; }
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2800);
}

// ===== CÓDIGO DO CLIENTE: obrigatório + único (validação em tempo real) =====
function normalizeCode(v) { return (v || "").trim().toLowerCase(); }

function isCodeTaken(code) {
  const key = normalizeCode(code);
  if (!key) return false;
  const state = loadState();
  return (state.clients || []).some(c => normalizeCode(c.code) === key) || (state.suppliers || []).some(s => normalizeCode(s.code) === key);
}

function updateCodigoStatus() {
  const input = el("novoClienteCodigo");
  const status = el("codigoStatus");
  const btn = el("btnCriarCliente");
  if (!input || !status || !btn) return;

  const v = input.value || "";
  const key = normalizeCode(v);

  if (!key) {
    status.textContent = "⚠️ Código é obrigatório";
    status.className = "code-status warn";
    btn.disabled = true;
    return;
  }

  if (isCodeTaken(v)) {
    status.textContent = "⚠️ Já existe um acesso com esse código";
    status.className = "code-status warn";
    btn.disabled = true;
    return;
  }

  status.textContent = "✅ Código disponível";
  status.className = "code-status ok";
  btn.disabled = false;
}

// LOGIN / LOGOUT
async function handleLogin() {
  const email = (el("loginEmail").value || "").trim().toLowerCase();
  const pass = el("loginPassword").value || "";
  const errorBox = el("loginError");

  if (!email || !pass) {
    errorBox.textContent = "Preencha email e senha.";
    errorBox.style.display = "block";
    return;
  }

  const state = loadState();
  const passHash = await sha256(pass);

  if (email === (state.admin.email || "").toLowerCase() && passHash === state.admin.passwordHash) {
    saveSession({ role: "admin", id: "admin" });
    initApp();
    return;
  }

  const client = (state.clients||[]).find(c => (c.email || "").toLowerCase() === email);
  if (client && client.passwordHash === passHash) {
    saveSession({ role: "client", id: client.id });
    initApp();
    return;
  }

  const sup = (state.suppliers||[]).find(s => (s.email || "").toLowerCase() === email);
  if (sup && sup.passwordHash === passHash) {
    saveSession({ role: "supplier", id: sup.id });
    initApp();
    return;
  }

  errorBox.textContent = "Email ou senha inválidos.";
  errorBox.style.display = "block";
}

function handleLogout() {
  const s = loadSession();
  if (s && s.preview && s.prevSession && s.prevSession.role === "admin") {
    saveSession(s.prevSession);
    initApp();
    showToast("Voltando para Admin.");
    return;
  }
  clearSession();
  showLogin();
}

function renderDashboard() {

  const state = loadState();

      </div>

        <div class="stat-value">${totalSuppliers}</div>

      </div>
      <div class="stat-card">
        <div class="stat-value">${total ? "✅" : "—"}</div>
        <div class="stat-label">portal como hub de links</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">Drive</div>
        <div class="stat-label">organização fica no Google Drive</div>
      </div>
    `;
    container.appendChild(header);

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div style="display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
        <div>
          <h3 style="margin-bottom:0.35rem;">Clientes já cadastrados</h3>
          <p style="color:var(--texto-suave); margin:0;">Clique em um cliente para abrir/editar os links do Drive.</p>
        </div>
        <button class="btn btn-primary" onclick="openNovoCliente()">+ Novo Acesso</button>
      </div>
      <div id="adminClientsList" style="margin-top:1.25rem;"></div>
    `;
    container.appendChild(card);

    const list = card.querySelector("#adminClientsList");
    if (!total) {
      list.innerHTML = `<p style="color:var(--texto-suave); margin:0.75rem 0 0;">Nenhum cliente cadastrado ainda.</p>`;
      return;
    }

    const table = document.createElement("div");
    table.className = "files-list";
    state.clients.slice().sort((a,b)=> (b.code||"").localeCompare(a.code||"")).forEach(c => {
      const row = document.createElement("div");
      row.className = "file-item";
      const title = `${c.code || ""} – ${c.cliente || ""}`.replace(/\s+–\s+–/g," – ");
      const updated = c.updatedAt ? formatDateBR(c.updatedAt) : "";
      const okLinks = c.links && c.links.documentos && c.links.arquivos && c.links.renders && c.links.obra;
      row.innerHTML = `
        <div class="file-info">
          <div class="file-name">${escapeHTML(title)}</div>
          <div class="file-meta">${okLinks ? "Links ok" : "Pendente configurar links"} • Atualizado: ${updated || "—"}</div>
        </div>
        <div class="file-actions">
          <button class="btn btn-secondary" onclick="openConfigHub('${c.id}')">Configurar</button>
          <button class="btn btn-primary" onclick="openClientPreview('${c.id}')">Abrir</button>
        </div>
      `;
      table.appendChild(row);
    });
    list.appendChild(table);
    return;
  }

  const client = session.role === "supplier"
    ? (state.suppliers || []).find(s => s.id === session.id)
    : (state.clients || []).find(c => c.id === session.id);

  if (!client) {
    container.innerHTML = `<div class="card"><p>Acesso não encontrado.</p></div>`;
    return;
  }

  const title = `${client.code || ""} – ${client.cliente || ""} – ${client.projeto || ""}`.replace(/\s+–\s+–/g," – ");
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    ${session && session.preview && session.prevSession && session.prevSession.role==="admin" ? `
    <div style="display:flex; justify-content:flex-end; margin-bottom:0.75rem;">
      <button class="btn btn-secondary" onclick="backToAdmin()">← Voltar para Admin</button>
    </div>
    ` : ``}

    <h2 style="margin-bottom:0.5rem;">${escapeHTML(title)}</h2>
    <p style="color:var(--texto-suave); margin-top:0; margin-bottom:1.25rem;">Acesso rápido às pastas do Google Drive.</p>

    <div class="projects-grid" style="margin-top:0.5rem;">
      ${session.role === "supplier"
        ? (hubButton("🧩 Arquivos de Projeto", client.links?.arquivos) + hubButton("🖼️ Renders", client.links?.renders))
        : (hubButton("📄 Documentos", client.links?.documentos) + hubButton("🧩 Arquivos de Projeto", client.links?.arquivos) + hubButton("🖼️ Renders", client.links?.renders) + hubButton("🏗️ Imagens de Obra", client.links?.obra))}
    </div>
  `;
  container.appendChild(card);
}

function hubButton(label, url) {
  const disabled = !url;
  const safeUrl = url ? escapeAttr(url) : "#";
  const parts = (label || "").trim().split(/\s+/);
  const first = parts[0] || "";
  const hasIcon = first && !/^[A-Za-z0-9]/.test(first);
  const icon = hasIcon ? first : "🔗";
  const title = hasIcon ? parts.slice(1).join(" ") : (label || "");
  return `
    <div class="project-card ${disabled ? "disabled" : ""}">
      <div class="hub-left">
        <div class="hub-icon">${escapeHTML(icon)}</div>
        <div>
          <div class="hub-title">${escapeHTML(title.trim())}</div>
          <div class="hub-sub">${disabled ? "Link não configurado" : "Clique para abrir a pasta no Google Drive"}</div>
        </div>
      </div>
      <div class="hub-actions">
        <a class="hub-open" href="${disabled ? "#" : safeUrl}" target="_blank" rel="noopener noreferrer" aria-disabled="${disabled ? "true" : "false"}">
          Abrir no Drive <span aria-hidden="true">↗</span>
        </a>
      </div>
    </div>
  `;
}

function renderCadastro() {
  const session = loadSession();
  if (!session || session.role !== "admin") {

  const container = el("clientesContent");

      <div>
        <h3 style="margin-bottom:0.35rem;">Cadastro de acessos</h3>

      </div>
      <button class="btn btn-primary" onclick="openNovoCliente()">+ Novo Acesso</button>
    </div>
    <div id="cadList" style="margin-top:1.25rem;"></div>
  `;
  container.appendChild(card);

  const list = card.querySelector("#cadList");
  const clientes = (state.clients || []).map(x => ({...x, type:"client"}));
  const fornecedores = (state.suppliers || []).map(x => ({...x, type:"supplier"}));

  if (!clientes.length && !fornecedores.length) {
    list.innerHTML = `<p style="color:var(--texto-suave); margin:0.75rem 0 0;">Nenhum acesso cadastrado.</p>`;
    return;
  }

  const wrap = document.createElement("div");
  wrap.style.display = "grid";
  wrap.style.gap = "1rem";

  function renderGroup(title, items) {
    const sec = document.createElement("div");
    sec.className = "card";
    sec.style.boxShadow = "none";
    sec.style.border = "1px solid rgba(0,0,0,0.06)";
    sec.style.background = "rgba(255,255,255,0.65)";
    sec.innerHTML = `<h4 style="margin:0 0 0.75rem 0;">${escapeHTML(title)}</h4>`;
    if (!items.length) {
      sec.innerHTML += `<p style="color:var(--texto-suave); margin:0;">Nenhum.</p>`;
      return sec;
    }
    const table = document.createElement("div");
    table.className = "files-list";
    items.slice().sort((a,b)=> (b.code||"").localeCompare(a.code||"")).forEach(c => {
      const titleLine = `${c.code || ""} – ${c.cliente || ""} – ${c.projeto || ""}`.replace(/\s+–\s+–/g," – ");
      const row = document.createElement("div");
      row.className = "file-item";

          <div class="file-meta">${escapeHTML(c.type==="supplier" ? "Fornecedor" : "Cliente")}</div>

        </div>
      `;
      table.appendChild(row);
    });
    sec.appendChild(table);
    return sec;
  }

  wrap.appendChild(renderGroup("Clientes", clientes));
  wrap.appendChild(renderGroup("Fornecedores", fornecedores));
  list.appendChild(wrap);
}

  const code = (el("novoClienteCodigo").value || "").trim();
  const cliente = (el("novoClienteCliente").value || "").trim();
  const projeto = (el("novoClienteProjeto").value || "").trim();
  const endereco = (el("novoClienteEndereco").value || "").trim();
  const telefone = (el("novoClienteTelefone").value || "").trim();
  const email = (el("novoClienteEmail").value || "").trim().toLowerCase();
  const senha = (el("novoClienteSenha").value || "");
  const nascimento = (el("novoClienteNascimento").value || "").trim();

  if (isCodeTaken(code)) {
    showToast("Já existe um acesso cadastrado com esse código.");
    updateCodigoStatus();
    return;
  }

  if (!code || !cliente || !projeto || !email || !senha) {
    showToast("Preencha: código, cliente, projeto, email e senha.");
    return;
  }
  if (senha.length < 6) {
    showToast("Senha muito curta (mínimo 6 caracteres).");
    return;
  }
  if ((state.clients||[]).some(c => (c.email||"").toLowerCase() === email) || (state.suppliers||[]).some(s => (s.email||"").toLowerCase() === email)) {
    showToast("Já existe um acesso com esse email.");
    return;
  }

  const tipo = (el("novoTipo")?.value || "client").trim();
  const passwordHash = await sha256(senha);

  const baseUser = {
    id: uid(),
    code,
    cliente,
    projeto,
    endereco,
    telefone,
    email,
    passwordHash,
    nascimento: nascimento || null,
    createdAt: nowISO(),
    updatedAt: nowISO()
  };

  let created;
  if (tipo === "supplier") {
    created = { ...baseUser, links: { arquivos:"", renders:"" } };
    state.suppliers = state.suppliers || [];
    state.suppliers.push(created);
  } else {
    created = { ...baseUser, links: { documentos:"", arquivos:"", renders:"", obra:"" } };
    state.clients = state.clients || [];
    state.clients.push(created);
  }

  try { saveState(state); } catch(e) { return; }

  closeModal("modalNovoCliente");
  showToast("Acesso criado. Agora configure os links do Drive.");
  openConfigHub(created.id);
  renderDashboard();
  renderCadastro();
}

function findAccessById(state, id) {
  const c = (state.clients || []).find(x => x.id === id);
  if (c) return { user: c, type: "client" };
  const s = (state.suppliers || []).find(x => x.id === id);
  if (s) return { user: s, type: "supplier" };
  return null;
}

function openConfigHub(accessId) {
  const state = loadState();
  const found = findAccessById(state, accessId);
  if (!found) return;
  const a = found.user;
  const type = found.type;

  el("configClientId").value = a.id;
  el("configClientTitle").textContent = `${a.code || ""} – ${a.cliente || ""} – ${a.projeto || ""}`.replace(/\s+–\s+–/g," – ");

  const wrapDocs = el("wrapLinkDocumentos");
  const wrapObra = el("wrapLinkObra");
  if (type === "supplier") {
    if (wrapDocs) wrapDocs.style.display = "none";
    if (wrapObra) wrapObra.style.display = "none";
  } else {
    if (wrapDocs) wrapDocs.style.display = "";
    if (wrapObra) wrapObra.style.display = "";
  }

  el("linkDocumentos").value = a.links?.documentos || "";
  el("linkArquivos").value = a.links?.arquivos || "";
  el("linkRenders").value = a.links?.renders || "";
  el("linkObra").value = a.links?.obra || "";

  openModal("modalConfigHub");
}

async function salvarConfigHub() {
  const state = loadState();
  const accessId = el("configClientId").value;
  const found = findAccessById(state, accessId);
  if (!found) return;

  const a = found.user;
  const type = found.type;

  if (type === "supplier") {
    a.links = {
      arquivos: (el("linkArquivos").value || "").trim(),
      renders: (el("linkRenders").value || "").trim()
    };
  } else {
    a.links = {
      documentos: (el("linkDocumentos").value || "").trim(),
      arquivos: (el("linkArquivos").value || "").trim(),
      renders: (el("linkRenders").value || "").trim(),
      obra: (el("linkObra").value || "").trim()
    };
  }

  a.updatedAt = nowISO();
  saveState(state);
  closeModal("modalConfigHub");
  showToast("Configuração salva.");
  renderDashboard();
  renderCadastro();
}

function openClientDados(accessId) {
  const state = loadState();
  const found = findAccessById(state, accessId);
  if (!found) return;
  const a = found.user;
  const type = found.type;

  const sections = [];
  const pushSection = (title, rows) => {
    const filtered = rows.filter(r => r && r.value !== "" && r.value !== null && r.value !== undefined);
    if (!filtered.length) return;
    const htmlRows = filtered.map(r => `
      <div class="data-row">
        <div class="data-k">${escapeHTML(r.key)}</div>
        <div class="data-v">${escapeHTML(r.value)}</div>
      </div>
    `).join("");
    sections.push(`
      <div class="data-section">
        <div class="data-title">${escapeHTML(title)}</div>
        <div class="data-grid">${htmlRows}</div>
      </div>
    `);
  };

  const safeDate = (d) => formatDateBR(d) || "";

  pushSection("Identificação", [
    {key:"Tipo", value: (type === "supplier" ? "Fornecedor" : "Cliente")},
    {key:"Código", value: a.code || ""},
    {key:"Nome", value: a.cliente || ""},
  ]);

  pushSection("Projeto", [
    {key:"Projeto", value: a.projeto || ""},
    {key:"Endereço", value: a.endereco || ""},
  ]);

  pushSection("Contato", [
    {key:"Email", value: a.email || ""},
    ...(type === "supplier" ? [] : [{key:"Telefone", value: a.telefone || ""}]),
  ]);

  pushSection("Controle", [
    ...(type === "supplier" ? [] : [{key:"Nascimento", value: safeDate(a.nascimento)}]),
    {key:"Criado em", value: safeDate(a.createdAt)},
    {key:"Atualizado em", value: safeDate(a.updatedAt)},
  ]);

  el("dadosBody").innerHTML = sections.join("") || `<p style="color:var(--texto-suave); margin:0;">Sem dados.</p>`;
  openModal("modalDados");
}

async function resetClientPasswordPrompt(accessId) {
  const state = loadState();
  const found = findAccessById(state, accessId);
  if (!found) return;
  const a = found.user;

  const nova = prompt("Defina a nova senha (mínimo 6 caracteres):");
  if (nova === null) return;
  if ((nova || "").length < 6) { showToast("Senha muito curta."); return; }
  a.passwordHash = await sha256(nova);
  a.updatedAt = nowISO();
  saveState(state);
  showToast("Senha atualizada.");
}

function deleteClient(accessId) {
  const state = loadState();
  const found = findAccessById(state, accessId);
  if (!found) return;
  const a = found.user;
  const label = `${a.code || ""} – ${a.cliente || ""}`.trim();
  if (!confirm(`Excluir "${label}"?`)) return;

  state.clients = (state.clients || []).filter(x => x.id !== accessId);
  state.suppliers = (state.suppliers || []).filter(x => x.id !== accessId);

  saveState(state);
  showToast("Excluído.");
  renderDashboard();
  renderCadastro();
}

function openClientPreview(clientId) {
  const current = loadSession();
  const prev = current && current.role === "admin" ? current : { role: "admin" };
  saveSession({ role: "client", id: clientId, preview: true, prevSession: prev });
  initApp();
  showToast("Abrindo portal do cliente (preview). Use “Voltar para Admin” no topo.");
}

function backToAdmin() {
  const s = loadSession();
  if (s && s.preview && s.prevSession && s.prevSession.role === "admin") {
    saveSession(s.prevSession);
    initApp();
    showToast("Voltando para Admin.");
  } else {
    showToast("Sessão de admin não encontrada.");
  }
}

// Utils de escape
function escapeHTML(str) {
  return (str||"").replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[s]));
}
function escapeAttr(str) { return (str||"").replace(/"/g, "&quot;"); }

// INIT
function initApp() {
  const session = loadSession();
  if (!session) { showLogin(); return; }

  showPortal();
  const state = loadState();

  if (session.role === "admin") {
    setUserUI({ name: state.admin.name || "Admin", role: "admin" });
  } else {
    const c = session.role === "supplier"
      ? (state.suppliers || []).find(x => x.id === session.id)
      : (state.clients || []).find(x => x.id === session.id);
    const displayName = c ? (c.cliente || (session.role === "supplier" ? "Fornecedor" : "Cliente")) : (session.role === "supplier" ? "Fornecedor" : "Cliente");
    setUserUI({ name: displayName, role: session.role });
  }

  const menuItems = document.querySelectorAll(".sidebar-menu .menu-item");
  if (menuItems[1]) menuItems[1].style.display = (session.role === "admin") ? "flex" : "none";

  showSection("dashboard");
}

window.addEventListener("click", (e) => {
  const overlays = ["modalNovoCliente","modalConfigHub"];
  overlays.forEach(id => {
    const m = el(id);
    if (m && e.target === m) m.classList.remove("show");
  });
});

window.addEventListener("load", () => {
  loadState();
  initApp();
  const nt = el("novoTipo");
  if (nt) nt.addEventListener("change", updateNovoTipoFields);
  updateNovoTipoFields();
});

document.addEventListener("DOMContentLoaded", () => {
  const codigo = el("novoClienteCodigo");
  if (codigo) codigo.addEventListener("input", updateCodigoStatus);
});
</script>
</body>
