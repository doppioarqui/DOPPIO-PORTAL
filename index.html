<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>DOPPIO Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --verde: #4A5E4A;
      --terracota: #C4714F;
      --terracota-dark: #A85A3A;
      --bege: #F5F0E8;
      --bege-dark: #EDE6D6;
      --texto: #2C2416;
      --texto-suave: #8A7D6B;
      --branco: #FDFBF7;
    }
    body { font-family: 'Montserrat', sans-serif; background: var(--bege); color: var(--texto); min-height: 100vh; }

    /* LOGIN */
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-box { background: var(--branco); padding: 3rem; border-radius: 16px; box-shadow: 0 8px 32px rgba(44,36,22,0.1); width: 100%; max-width: 400px; }
    .login-logo { font-size: 2rem; font-weight: 300; letter-spacing: 0.3em; text-align: center; margin-bottom: 0.5rem; color: var(--verde); }
    .login-subtitle { text-align: center; color: var(--texto-suave); font-size: 0.9rem; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.5rem; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--texto); }
    .form-input { width: 100%; padding: 0.9rem; border: 1px solid var(--bege-dark); border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 0.95rem; background: var(--bege); transition: all 0.2s; }
    .form-input:focus { outline: none; border-color: var(--terracota); background: var(--branco); }
    .password-wrapper { position: relative; }
    .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--texto-suave); }
    .btn-login { width: 100%; padding: 1rem; background: var(--terracota); color: white; border: none; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-login:hover { background: var(--terracota-dark); transform: translateY(-2px); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-message { background: #FEE2E2; color: #B91C1C; padding: 0.75rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; display: none; }

    /* HUB */
    .projects-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    @media (max-width: 900px) { .projects-grid { grid-template-columns: 1fr; } }
    .project-card { background: var(--branco); border: 1px solid rgba(44,36,22,0.10); border-radius: 14px; padding: 16px; transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease; display: flex; align-items: stretch; justify-content: space-between; gap: 12px; min-height: 92px; }
    .project-card:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(44,36,22,0.10); border-color: rgba(196,113,79,0.35); }
    .project-card.disabled:hover { transform: none; box-shadow: none; border-color: rgba(44,36,22,0.10); }
    .hub-left { display:flex; gap: 12px; align-items:flex-start; }
    .hub-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--bege-dark); display:flex; align-items:center; justify-content:center; font-size: 22px; flex: 0 0 44px; }
    .hub-title { font-weight: 700; font-size: 1.0rem; }
    .hub-sub { color: var(--texto-suave); font-size: 0.9rem; margin-top: 4px; line-height: 1.25; }
    .hub-actions { display:flex; align-items:center; justify-content:flex-end; }
    .hub-open { display: inline-flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 0.9rem; background: var(--terracota); color: #fff; white-space: nowrap; }
    .hub-open:hover { background: var(--terracota-dark); }
    .hub-open[aria-disabled="true"] { background: rgba(0,0,0,0.06); color: rgba(44,36,22,0.45); pointer-events: none; }

    /* PORTAL */
    .portal-container { display: none; min-height: 100vh; }
    .portal-container.active { display: flex; }
    .sidebar { width: 260px; background: var(--verde); display: flex; flex-direction: column; padding: 2rem 0; position: fixed; left: 0; top: 0; bottom: 0; }
    .sidebar-logo { font-size: 1.5rem; font-weight: 300; letter-spacing: 0.25em; color: var(--bege); padding: 0 1.5rem 2rem; border-bottom: 1px solid rgba(245,240,232,0.1); }
    .sidebar-menu { flex: 1; padding: 2rem 0; }
    .menu-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.85rem 1.5rem; color: rgba(245,240,232,0.6); cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; }
    .menu-item:hover { background: rgba(245,240,232,0.05); color: var(--bege); }
    .menu-item.active { background: rgba(245,240,232,0.08); color: var(--bege); border-left-color: var(--terracota); }
    .sidebar-user { padding: 1.5rem; border-top: 1px solid rgba(245,240,232,0.1); }
    .user-info { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; color: var(--bege); }
    .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--terracota); display: flex; align-items: center; justify-content: center; font-weight: 600; }
    .user-name { font-size: 0.9rem; font-weight: 500; }
    .user-role { font-size: 0.75rem; color: rgba(245,240,232,0.5); }
    .btn-logout { width: 100%; padding: 0.6rem; background: rgba(245,240,232,0.08); border: 1px solid rgba(245,240,232,0.15); border-radius: 6px; color: rgba(245,240,232,0.6); cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { background: rgba(245,240,232,0.15); color: var(--bege); }
    .main-content { margin-left: 260px; padding: 2.5rem; min-height: 100vh; }
    .page-header { margin-bottom: 2rem; }
    .page-title { font-size: 2rem; font-weight: 500; color: var(--texto); margin-bottom: 0.25rem; }
    .page-subtitle { color: var(--texto-suave); font-size: 0.9rem; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: var(--branco); border-radius: 12px; padding: 2rem; box-shadow: 0 4px 24px rgba(44,36,22,0.08); margin-bottom: 1.5rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2rem; }
    .stat-card { background: var(--branco); padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 24px rgba(44,36,22,0.08); }
    .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--texto-suave); margin-bottom: 0.75rem; }
    .stat-value { font-size: 2rem; font-weight: 600; color: var(--texto); }
    .btn { padding: 0.75rem 1.5rem; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; }
    .btn-primary { background: var(--terracota); color: white; }
    .btn-primary:hover { background: var(--terracota-dark); }
    .btn-secondary { background: var(--bege-dark); color: var(--texto); }
    .loading { text-align: center; padding: 3rem; color: var(--texto-suave); }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--bege-dark); border-top-color: var(--terracota); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; border-radius: 8px; background: var(--verde); color: white; box-shadow: 0 8px 32px rgba(0,0,0,0.2); transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 1000; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: #B91C1C; }

    /* MODAIS */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--branco); border-radius: 16px; padding: 2rem; width: 90%; max-width: 920px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .modal h2 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--texto); }
    .modal-actions { display: flex; gap: 1rem; margin-top: 1.5rem; }
    .btn-block { flex: 1; }
    .modal-scroll { max-height: 85vh; overflow: auto; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem 1.25rem; }
    .grid-span-2 { grid-column: 1 / -1; }
    @media (max-width: 768px) {
      .sidebar { width: 200px; }
      .main-content { margin-left: 200px; padding: 1.5rem; }
      .stats-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .grid-span-2 { grid-column: auto; }
    }

    .files-list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
    .file-item { display:flex; align-items:center; justify-content:space-between; gap: 16px; padding: 14px 14px; border-radius: 14px;
      border: 1px solid rgba(0,0,0,0.06); background: rgba(255,255,255,0.92); }
    .file-info { min-width: 220px; }
    .file-name { font-weight: 700; font-size: 1.02rem; line-height: 1.25; margin-bottom: 4px; }
    .file-meta { color: var(--texto-suave); font-size: 0.9rem; }
    .file-actions { display:flex; flex-wrap: wrap; gap: 10px; justify-content:flex-end; }
    @media (max-width: 720px) {
      .file-item { flex-direction: column; align-items: flex-start; }
      .file-actions { justify-content:flex-start; }
    }

    .code-status { font-size: 0.8rem; margin-top: -0.5rem; color: var(--texto-suave); }
    .code-status.ok { color: #0A8A3A; }
    .code-status.warn { color: #B91C1C; }
  </style>
</head>
<body>
  <div class="login-container" id="loginPage">
    <div class="login-box">
      <div class="login-logo">DOPPIO</div>
      <div class="login-subtitle">Portal do Cliente</div>
      <div class="error-message" id="loginError"></div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="loginEmail" placeholder="seu@email.com" type="email"/>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <div class="password-wrapper">
          <input class="form-input" id="loginPassword" placeholder="••••••••" style="padding-right: 3rem;" type="password"/>
          <button class="password-toggle" onclick="togglePassword()" type="button" title="Mostrar/ocultar senha">
            <svg fill="none" height="20" id="eyeIcon" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="20">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
      <button class="btn-login" id="btnLogin" onclick="handleLogin()">Entrar</button>
    </div>
  </div>

  <div class="portal-container" id="portalPage">
    <aside class="sidebar">
      <div class="sidebar-logo">DOPPIO</div>
      <div class="sidebar-menu">
        <div class="menu-item active" onclick="showSection('dashboard')">
          <svg fill="none" height="18" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18">
            <rect height="7" width="7" x="3" y="3"></rect>
            <rect height="7" width="7" x="14" y="3"></rect>
            <rect height="7" width="7" x="3" y="14"></rect>
            <rect height="7" width="7" x="14" y="14"></rect>
          </svg>
          Dashboard
        </div>
        <div class="menu-item" id="menuCadastro" onclick="showSection('clientes')">
          <svg fill="none" height="18" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
          </svg>
          Cadastro
        </div>
      </div>
      <div class="sidebar-user">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">?</div>
          <div>
            <div class="user-name" id="userName">Usuário</div>
            <div class="user-role" id="userRole">Cliente</div>
          </div>
        </div>
        <button class="btn-logout" onclick="handleLogout()">Sair</button>
      </div>
    </aside>

    <main class="main-content">
      <section class="section active" id="sectionDashboard">
        <div class="page-header">
          <h1 class="page-title" id="dashboardTitle">Dashboard</h1>
          <p class="page-subtitle">Bem-vindo ao portal</p>
        </div>
        <div id="dashboardContent"><div class="loading"><div class="spinner"></div></div></div>
      </section>

      <section class="section" id="sectionClientes">
        <div class="page-header">
          <h1 class="page-title">Cadastro</h1>
          <p class="page-subtitle">Cadastrar clientes e configurar links do Drive</p>
        </div>
        <div id="clientesContent"><div class="loading"><div class="spinner"></div></div></div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="modalNovoCliente">
    <div class="modal modal-scroll">
      <h2>Novo Acesso</h2>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Código</label>
          <input class="form-input" id="novoClienteCodigo" placeholder="Ex: 2026-014" type="text"/>
        </div>
        <div class="form-group">
          <label class="form-label">Tipo de acesso</label>
          <!-- FIX #3: values agora usam "cliente"/"fornecedor" para bater com a Edge Function -->
          <select class="form-input" id="novoTipo">
            <option value="cliente" selected>Cliente</option>
            <option value="fornecedor">Fornecedor</option>
          </select>
        </div>
        <div class="form-group grid-span-2"><div id="codigoStatus" class="code-status"></div></div>

        <div class="form-group">
          <label class="form-label">Nome</label>
          <input class="form-input" id="novoClienteCliente" placeholder="Ex: Silva" type="text"/>
        </div>
        <div class="form-group grid-span-2">
          <label class="form-label">Projeto</label>
          <input class="form-input" id="novoClienteProjeto" placeholder="Ex: Residência Alphaville" type="text"/>
        </div>
        <div class="form-group grid-span-2">
          <label class="form-label">Endereço</label>
          <input class="form-input" id="novoClienteEndereco" placeholder="(opcional)" type="text"/>
        </div>
        <div class="form-group" id="fgTelefone">
          <label class="form-label">Telefone</label>
          <input class="form-input" id="novoClienteTelefone" placeholder="(opcional)" type="text"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" id="novoClienteEmail" placeholder="seu@email.com" type="email"/>
        </div>
        <div class="form-group">
          <label class="form-label">Senha</label>
          <input class="form-input" id="novoClienteSenha" placeholder="Mínimo 6 caracteres" type="password"/>
        </div>
        <div class="form-group" id="fgNascimento">
          <label class="form-label">Data de nascimento</label>
          <input class="form-input" id="novoClienteNascimento" type="date"/>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary btn-block" onclick="closeModal('modalNovoCliente')">Cancelar</button>
        <button class="btn btn-primary btn-block" id="btnCriarCliente" onclick="criarCliente()">Criar</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalConfigHub">
    <div class="modal modal-scroll">
      <h2>Configurar Links</h2>
      <input id="configClientId" type="hidden"/>
      <input id="configClientType" type="hidden"/>
      <p style="color: var(--texto-suave); margin-bottom: 1rem;">Projeto: <strong id="configClientTitle"></strong></p>

      <div class="form-group" id="wrapLinkDocumentos">
        <label class="form-label">Link - Documentos (Drive)</label>
        <input class="form-input" id="linkDocumentos" placeholder="Cole o link da pasta no Google Drive" type="url"/>
      </div>
      <div class="form-group">
        <label class="form-label">Link - Arquivos de Projeto (Drive)</label>
        <input class="form-input" id="linkArquivos" placeholder="Cole o link da pasta no Google Drive" type="url"/>
      </div>
      <div class="form-group">
        <label class="form-label">Link - Renders (Drive)</label>
        <input class="form-input" id="linkRenders" placeholder="Cole o link da pasta no Google Drive" type="url"/>
      </div>
      <div class="form-group" id="wrapLinkObra">
        <label class="form-label">Link - Imagens de Obra (Drive)</label>
        <input class="form-input" id="linkObra" placeholder="Cole o link da pasta no Google Drive" type="url"/>
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary btn-block" onclick="closeModal('modalConfigHub')">Cancelar</button>
        <button class="btn btn-primary btn-block" onclick="salvarConfigHub()">Salvar</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://haqwejvyniytgihndeob.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhhcXdlanZ5bml5dGdpaG5kZW9iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0ODYzMjUsImV4cCI6MjA4ODA2MjMyNX0.Gm9G8iKt9GH7FUJstu2Y_M1VJe77-px8HfCdyRN-niA";
    // FIX #1: ADMIN_CREATE_KEY agora declarada
    const ADMIN_CREATE_KEY = "doppio-admin-2026";
    const FUNCTIONS_BASE = `${SUPABASE_URL}/functions/v1`;

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const el = (id) => document.getElementById(id);

    function showToast(msg, isError=false) {
      const t = el("toast");
      if (!t) { alert(msg); return; }
      t.textContent = msg;
      t.classList.toggle("error", !!isError);
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2800);
    }

    function showLogin() {
      el("loginPage").style.display = "flex";
      el("portalPage").classList.remove("active");
      el("loginError").style.display = "none";
    }

    function showPortal() {
      el("loginPage").style.display = "none";
      el("portalPage").classList.add("active");
    }

    function setUserUI({ name, role }) {
      el("userName").textContent = name || "Usuário";
      // FIX #2: roles agora usam "fornecedor"/"cliente" consistentemente
      el("userRole").textContent = role === "admin" ? "Admin" : (role === "fornecedor" ? "Fornecedor" : "Cliente");
      el("userAvatar").textContent = (name || "?").trim().slice(0,1).toUpperCase();
      el("menuCadastro").style.display = (role === "admin") ? "flex" : "none";
    }

    function setActiveMenu(sectionName) {
      document.querySelectorAll(".sidebar-menu .menu-item").forEach(mi => mi.classList.remove("active"));
      const map = { dashboard: 0, clientes: 1 };
      const idx = map[sectionName];
      if (typeof idx === "number") {
        const item = document.querySelectorAll(".sidebar-menu .menu-item")[idx];
        if (item) item.classList.add("active");
      }
    }

    function showSection(name) {
      const role = window.__currentRole || "cliente";
      if (role !== "admin" && name !== "dashboard") name = "dashboard";

      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      if (name === "dashboard") el("sectionDashboard").classList.add("active");
      if (name === "clientes") el("sectionClientes").classList.add("active");
      setActiveMenu(name);

      if (name === "dashboard") renderDashboard().catch(console.error);
      if (name === "clientes") renderCadastro().catch(console.error);
    }
    window.showSection = showSection;

    function togglePassword() {
      const input = el("loginPassword");
      const icon = el("eyeIcon");
      if (!input) return;
      const isPass = input.type === "password";
      input.type = isPass ? "text" : "password";
      if (icon) icon.style.opacity = isPass ? "0.6" : "1";
    }
    window.togglePassword = togglePassword;

    function escapeHTML(str) {
      return (str||"").replace(/[&<>"']/g, s => ({
        "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
      }[s]));
    }
    function escapeAttr(str) { return (str||"").replace(/"/g, "&quot;"); }

    async function handleLogin() {
      const email = (el("loginEmail").value || "").trim().toLowerCase();
      const password = el("loginPassword").value || "";
      const errorBox = el("loginError");

      if (!email || !password) {
        errorBox.textContent = "Preencha email e senha.";
        errorBox.style.display = "block";
        return;
      }

      el("btnLogin").disabled = true;
      errorBox.style.display = "none";

      const { error } = await sb.auth.signInWithPassword({ email, password });
      el("btnLogin").disabled = false;

      if (error) {
        errorBox.textContent = "Email ou senha inválidos.";
        errorBox.style.display = "block";
        return;
      }

      await initApp();
    }
    window.handleLogin = handleLogin;

    async function handleLogout() {
      await sb.auth.signOut();
      showLogin();
    }
    window.handleLogout = handleLogout;

    // FIX #5: callFn padronizado — aceita string ou objeto como 3º argumento
    async function callFn(fnName, body, opts = {}) {
      const options = (typeof opts === "string") ? { method: opts } : opts;
      const method = (options.method || "POST").toUpperCase();
      const requireAdminKey = options.requireAdminKey !== false;

      const headers = { "Content-Type": "application/json" };

      if (requireAdminKey) {
        if (!ADMIN_CREATE_KEY) throw new Error("ADMIN_CREATE_KEY não configurada no index.html");
        headers["x-admin-key"] = ADMIN_CREATE_KEY;
      }

      const url = `${FUNCTIONS_BASE}/${fnName}`;

      const res = await fetch(url, {
        method,
        headers,
        body: method === "GET" ? undefined : JSON.stringify(body ?? {}),
      });

      const json = await res.json().catch(() => ({}));
      if (!res.ok) {
        const msg = json?.error || json?.message || `HTTP ${res.status}`;
        throw new Error(msg);
      }
      return json;
    }

    function closeModal(id) {
      const m = el(id);
      if (m) m.classList.remove("show");
      if (id === "modalNovoCliente") {
        const status = el("codigoStatus");
        const btn = el("btnCriarCliente");
        if (status) { status.textContent = ""; status.className = "code-status"; }
        if (btn) btn.disabled = false;
      }
    }
    window.closeModal = closeModal;

    function openModal(id) {
      const m = el(id);
      if (m) m.classList.add("show");
      if (id === "modalNovoCliente") setTimeout(updateCodigoStatus, 0);
    }
    window.openModal = openModal;

    function updateNovoTipoFields() {
      // FIX #3: comparando com "fornecedor" em vez de "supplier"
      const t = (el("novoTipo")?.value || "cliente");
      const fgTel = el("fgTelefone");
      const fgNasc = el("fgNascimento");
      if (t === "fornecedor") {
        if (fgTel) fgTel.style.display = "none";
        if (fgNasc) fgNasc.style.display = "none";
      } else {
        if (fgTel) fgTel.style.display = "";
        if (fgNasc) fgNasc.style.display = "";
      }
    }

    function openNovoCliente() {
      ["novoTipo","novoClienteCodigo","novoClienteCliente","novoClienteProjeto","novoClienteEndereco","novoClienteTelefone","novoClienteEmail","novoClienteSenha","novoClienteNascimento"]
        .forEach(id => { const x = el(id); if (x) x.value=""; });
      updateNovoTipoFields();
      openModal("modalNovoCliente");
    }
    window.openNovoCliente = openNovoCliente;

    function normalizeCode(v) { return (v || "").trim().toLowerCase(); }

    async function isCodeTaken(code) {
      const key = normalizeCode(code);
      if (!key) return false;
      // FIX #2: list-accesses retorna tudo em "items", separamos por role
      const list = await callFn("list-accesses", null, { method: "POST" });
      const items = list?.items || [];
      const all = Array.isArray(items) ? items : [];
      return all.some(x => normalizeCode(x.codigo) === key);
    }

    async function updateCodigoStatus() {
      const input = el("novoClienteCodigo");
      const status = el("codigoStatus");
      const btn = el("btnCriarCliente");
      if (!input || !status || !btn) return;

      const v = input.value || "";
      const key = normalizeCode(v);

      if (!key) {
        status.textContent = "⚠️ Código é obrigatório";
        status.className = "code-status warn";
        btn.disabled = true;
        return;
      }

      try {
        const taken = await isCodeTaken(v);
        if (taken) {
          status.textContent = "⚠️ Já existe um acesso com esse código";
          status.className = "code-status warn";
          btn.disabled = true;
          return;
        }
        status.textContent = "✅ Código disponível";
        status.className = "code-status ok";
        btn.disabled = false;
      } catch (e) {
        status.textContent = "ℹ️ Não consegui validar o código agora (ok para continuar).";
        status.className = "code-status";
        btn.disabled = false;
      }
    }

    function hubButton(label, url) {
      const disabled = !url;
      const safeUrl = url ? escapeAttr(url) : "#";
      const parts = (label || "").trim().split(/\s+/);
      const first = parts[0] || "";
      const hasIcon = first && !/^[A-Za-z0-9]/.test(first);
      const icon = hasIcon ? first : "🔗";
      const title = hasIcon ? parts.slice(1).join(" ") : (label || "");
      return `
        <div class="project-card ${disabled ? "disabled" : ""}">
          <div class="hub-left">
            <div class="hub-icon">${escapeHTML(icon)}</div>
            <div>
              <div class="hub-title">${escapeHTML(title.trim())}</div>
              <div class="hub-sub">${disabled ? "Link não configurado" : "Clique para abrir a pasta no Google Drive"}</div>
            </div>
          </div>
          <div class="hub-actions">
            <a class="hub-open" href="${disabled ? "#" : safeUrl}" target="_blank" rel="noopener noreferrer" aria-disabled="${disabled ? "true" : "false"}">
              Abrir no Drive <span aria-hidden="true">↗</span>
            </a>
          </div>
        </div>
      `;
    }

    async function renderDashboard() {
      const container = el("dashboardContent");
      container.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;

      const role = window.__currentRole || "cliente";

      if (role === "admin") {
        const resp = await callFn("list-accesses", null, { method: "POST" });
        // FIX #2: separar clientes e fornecedores a partir do campo "role" em "items"
        const items = Array.isArray(resp?.items) ? resp.items : [];
        const cArr = items.filter(x => x.role === "cliente");
        const sArr = items.filter(x => x.role === "fornecedor");

        container.innerHTML = "";
        const header = document.createElement("div");
        header.className = "stats-grid";
        header.innerHTML = `
          <div class="stat-card"><div class="stat-value">${cArr.length}</div><div class="stat-label">clientes</div></div>
          <div class="stat-card"><div class="stat-value">${sArr.length}</div><div class="stat-label">fornecedores</div></div>
          <div class="stat-card"><div class="stat-value">${(cArr.length+sArr.length) ? "✅" : "—"}</div><div class="stat-label">hub de links</div></div>
        `;
        container.appendChild(header);

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div style="display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
            <div>
              <h3 style="margin-bottom:0.35rem;">Acessos cadastrados</h3>
              <p style="color:var(--texto-suave); margin:0;">Crie novos acessos e configure links do Drive.</p>
            </div>
            <button class="btn btn-primary" onclick="openNovoCliente()">+ Novo Acesso</button>
          </div>
          <div id="adminClientsList" style="margin-top:1.25rem;"></div>
        `;
        container.appendChild(card);

        const list = card.querySelector("#adminClientsList");
        const all = items.sort((a,b) => (b.codigo||"").localeCompare(a.codigo||""));

        if (!all.length) {
          list.innerHTML = `<p style="color:var(--texto-suave); margin:0.75rem 0 0;">Nenhum acesso cadastrado ainda.</p>`;
          return;
        }

        const table = document.createElement("div");
        table.className = "files-list";
        all.forEach(a => {
          const code = a.codigo || "";
          const nome = a.nome || "";
          const projeto = a.projeto || "";
          const title = [code, nome, projeto].filter(Boolean).join(" – ");
          const row = document.createElement("div");
          row.className = "file-item";
          row.innerHTML = `
            <div class="file-info">
              <div class="file-name">${escapeHTML(title)}</div>
              <div class="file-meta">${escapeHTML(a.role === "fornecedor" ? "Fornecedor" : "Cliente")}</div>
            </div>
            <div class="file-actions">
              <button class="btn btn-secondary" onclick="openConfigHub('${escapeAttr(a.id)}','${escapeAttr(a.role)}')">Links</button>
            </div>
          `;
          table.appendChild(row);
        });
        list.appendChild(table);
        return;
      }

      // Cliente ou fornecedor logado
      const resp = await callFn("list-accesses", null, { method: "POST" });
      const items = Array.isArray(resp?.items) ? resp.items : [];

      const { data: me } = await sb.auth.getUser();
      const uid = me?.user?.id;

      const access = items.find(x => x.id === uid) || null;

      if (!access) {
        container.innerHTML = `<div class="card"><p>Nenhum acesso encontrado para este usuário.</p></div>`;
        return;
      }

      const code = access.codigo || "";
      const nome = access.nome || "";
      const projeto = access.projeto || "";
      const title = [code, nome, projeto].filter(Boolean).join(" – ");

      const links = access.links || {};
      const documentos = links.documentos || "";
      const arquivos = links.arquivos || "";
      const renders = links.renders || "";
      const obra = links.obra || "";

      container.innerHTML = `
        <div class="card">
          <h2 style="margin-bottom:0.5rem;">${escapeHTML(title)}</h2>
          <p style="color:var(--texto-suave); margin-top:0; margin-bottom:1.25rem;">Acesso rápido às pastas do Google Drive.</p>
          <div class="projects-grid" style="margin-top:0.5rem;">
            ${role === "fornecedor"
              ? (hubButton("🧩 Arquivos de Projeto", arquivos) + hubButton("🖼️ Renders", renders))
              : (hubButton("📄 Documentos", documentos) + hubButton("🧩 Arquivos de Projeto", arquivos) + hubButton("🖼️ Renders", renders) + hubButton("🏗️ Imagens de Obra", obra))}
          </div>
        </div>
      `;
    }

    async function renderCadastro() {
      const role = window.__currentRole || "cliente";
      if (role !== "admin") { showSection("dashboard"); return; }

      const container = el("clientesContent");
      container.innerHTML = `<div class="loading"><div class="spinner"></div></div>`;

      const resp = await callFn("list-accesses", null, { method: "POST" });
      // FIX #2: separar por role dentro de items
      const items = Array.isArray(resp?.items) ? resp.items : [];

      container.innerHTML = "";
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div style="display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
          <div>
            <h3 style="margin-bottom:0.35rem;">Cadastro de acessos</h3>
            <p style="color:var(--texto-suave); margin:0;">Crie acessos (cliente/fornecedor) e configure links do Google Drive.</p>
          </div>
          <button class="btn btn-primary" onclick="openNovoCliente()">+ Novo Acesso</button>
        </div>
        <div id="cadList" style="margin-top:1.25rem;"></div>
      `;
      container.appendChild(card);

      const list = card.querySelector("#cadList");
      const all = items.sort((a,b) => (b.codigo||"").localeCompare(a.codigo||""));

      if (!all.length) {
        list.innerHTML = `<p style="color:var(--texto-suave); margin:0.75rem 0 0;">Nenhum acesso cadastrado.</p>`;
        return;
      }

      const table = document.createElement("div");
      table.className = "files-list";
      all.forEach(a => {
        const code = a.codigo || "";
        const nome = a.nome || "";
        const projeto = a.projeto || "";
        const titleLine = [code, nome, projeto].filter(Boolean).join(" – ");
        const row = document.createElement("div");
        row.className = "file-item";
        row.innerHTML = `
          <div class="file-info">
            <div class="file-name">${escapeHTML(titleLine)}</div>
            <div class="file-meta">${escapeHTML(a.role === "fornecedor" ? "Fornecedor" : "Cliente")}</div>
          </div>
          <div class="file-actions">
            <button class="btn btn-secondary" onclick="openConfigHub('${escapeAttr(a.id)}','${escapeAttr(a.role)}')">Links</button>
          </div>
        `;
        table.appendChild(row);
      });
      list.appendChild(table);
    }

    async function criarCliente() {
      const code = (el("novoClienteCodigo").value || "").trim();
      const cliente = (el("novoClienteCliente").value || "").trim();
      const projeto = (el("novoClienteProjeto").value || "").trim();
      const endereco = (el("novoClienteEndereco").value || "").trim();
      const telefone = (el("novoClienteTelefone").value || "").trim();
      const email = (el("novoClienteEmail").value || "").trim().toLowerCase();
      const senha = (el("novoClienteSenha").value || "");
      const nascimento = (el("novoClienteNascimento").value || "").trim();
      // FIX #3: tipo já vem como "cliente" ou "fornecedor" direto do select
      const tipo = (el("novoTipo")?.value || "cliente").trim();

      if (!code || !cliente || !projeto || !email || !senha) {
        showToast("Preencha: código, cliente, projeto, email e senha.", true);
        return;
      }
      if (senha.length < 6) {
        showToast("Senha muito curta (mínimo 6 caracteres).", true);
        return;
      }

      el("btnCriarCliente").disabled = true;

      try {
        await callFn("create-account", {
          email,
          password: senha,
          role: tipo,
          codigo: code,
          nome: cliente,
          projeto,
          endereco: endereco || null,
          telefone: telefone || null,
          nascimento: nascimento || null
        }, { method: "POST" });

        closeModal("modalNovoCliente");
        showToast("Acesso criado. Agora configure os links do Drive.");
        await renderDashboard();
        await renderCadastro();
      } catch (e) {
        showToast(e.message || "Erro ao criar acesso", true);
      } finally {
        el("btnCriarCliente").disabled = false;
      }
    }
    window.criarCliente = criarCliente;

    async function openConfigHub(accessId, roleType) {
      const resp = await callFn("list-accesses", null, { method: "POST" });
      const items = Array.isArray(resp?.items) ? resp.items : [];
      const a = items.find(x => x.id === accessId) || null;
      if (!a) { showToast("Acesso não encontrado.", true); return; }

      el("configClientId").value = a.id;
      el("configClientType").value = roleType;

      const code = a.codigo || "";
      const nome = a.nome || "";
      const projeto = a.projeto || "";
      el("configClientTitle").textContent = [code, nome, projeto].filter(Boolean).join(" – ");

      const wrapDocs = el("wrapLinkDocumentos");
      const wrapObra = el("wrapLinkObra");
      if (roleType === "fornecedor") {
        if (wrapDocs) wrapDocs.style.display = "none";
        if (wrapObra) wrapObra.style.display = "none";
      } else {
        if (wrapDocs) wrapDocs.style.display = "";
        if (wrapObra) wrapObra.style.display = "";
      }

      const links = a.links || {};
      el("linkDocumentos").value = links.documentos || "";
      el("linkArquivos").value = links.arquivos || "";
      el("linkRenders").value = links.renders || "";
      el("linkObra").value = links.obra || "";

      openModal("modalConfigHub");
    }
    window.openConfigHub = openConfigHub;

    async function salvarConfigHub() {
      const accessId = el("configClientId").value;
      const roleType = el("configClientType").value || "cliente";

      // FIX #4: payload corrigido — usa "profile_id" e campos soltos (sem objeto "links")
      let payload = {
        profile_id: accessId,
        arquivos: (el("linkArquivos").value || "").trim() || null,
        renders: (el("linkRenders").value || "").trim() || null,
      };

      if (roleType !== "fornecedor") {
        payload.documentos = (el("linkDocumentos").value || "").trim() || null;
        payload.obra = (el("linkObra").value || "").trim() || null;
      }

      try {
        await callFn("update-links", payload, { method: "POST" });
        closeModal("modalConfigHub");
        showToast("Configuração salva.");
        await renderDashboard();
        await renderCadastro();
      } catch (e) {
        showToast(e.message || "Erro ao salvar links", true);
      }
    }
    window.salvarConfigHub = salvarConfigHub;

    async function initApp() {
      const { data } = await sb.auth.getSession();
      const session = data?.session;
      if (!session) { showLogin(); return; }

      let role = "cliente";
      let nome = session.user.email || "Usuário";

      try {
        const { data: profile, error } = await sb
          .from("profiles")
          .select("role,nome,codigo,projeto")
          .eq("id", session.user.id)
          .maybeSingle();

        if (!error && profile) {
          role = profile.role || role;
          nome = profile.nome || nome;
        }
      } catch (e) { console.warn(e); }

      window.__currentRole = role;

      showPortal();
      el("dashboardTitle").textContent = (role === "admin") ? "Dashboard" : "Seu Portal";
      setUserUI({ name: nome, role });

      showSection("dashboard");
    }

    window.addEventListener("click", (e) => {
      ["modalNovoCliente","modalConfigHub"].forEach(id => {
        const m = el(id);
        if (m && e.target === m) m.classList.remove("show");
      });
    });

    window.addEventListener("load", () => {
      const codigo = el("novoClienteCodigo");
      if (codigo) codigo.addEventListener("input", () => updateCodigoStatus().catch(()=>{}));
      const nt = el("novoTipo");
      if (nt) nt.addEventListener("change", updateNovoTipoFields);
      initApp().catch(err => { console.error(err); showLogin(); });
    });

    sb.auth.onAuthStateChange(() => { initApp().catch(()=>{}); });
  </script>
</body>
</html>
